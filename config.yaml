#!/bin/bash
CSV="${1:-transactions.csv}"

if [ ! -f "$CSV" ]; then
  echo "Bestand niet gevonden: $CSV"
  exit 1
fi

python3 - "$CSV" << 'PYEOF'
import csv, sys

file = sys.argv[1]
trades = 0
wins = 0
losses = 0
total_pnl = 0.0
open_positions = {}

with open(file, newline='', encoding='utf-8') as f:
    reader = csv.DictReader(f)
    for row in reader:
        side = row.get('side', '').upper()
        symbol = row.get('market', '')
        price = float(row.get('price') or 0)
        amount = float(row.get('base_amount') or 0)
        quote = float(row.get('quote_amount') or 0)
        pnl = row.get('net_pnl_quote', '')
        reason = row.get('reason', '')

        if side == 'BUY':
            open_positions[symbol] = {'quote': quote, 'amount': amount, 'price': price}

        elif side == 'SELL':
            trades += 1
            if pnl:
                p = float(pnl)
                total_pnl += p
                if p > 0:
                    wins += 1
                else:
                    losses += 1

losses_calc = trades - wins
winrate = (wins / trades * 100) if trades > 0 else 0

print("=" * 50)
print(f"  TRADES OVERZICHT")
print("=" * 50)
print(f"  Totaal gesloten trades : {trades}")
print(f"  Winst trades           : {wins}")
print(f"  Verlies trades         : {losses_calc}")
print(f"  Winrate                : {winrate:.1f}%")
print(f"  Totaal PnL             : {total_pnl:+.2f} EUR")
print("-" * 50)
print(f"  Open posities          : {len(open_positions)}")
for sym, pos in open_positions.items():
    print(f"    {sym:<15} gekocht voor {pos['quote']:.2f} EUR @ {pos['price']:.6f}")
print("=" * 50)
PYEOF
