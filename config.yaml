python - <<'PY'
import json
from pathlib import Path

p = Path("state.json")
if p.exists():
    s = json.loads(p.read_text(encoding="utf-8"))
else:
    s = {}

s["positions"] = {}
s["cooldown"] = {}
s["short_cooldown"] = {}
s.setdefault("pnl_quote", 0.0)
s.setdefault("trades", 0)
s.setdefault("wins", 0)

p.write_text(json.dumps(s, indent=2, ensure_ascii=False), encoding="utf-8")
print("state.json opgeschoond")
PY

