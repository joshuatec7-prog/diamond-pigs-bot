quote: EUR
symbols: [BTC, ETH, XRP, SOL, TAO]
timeframe: "15m"

scanner:
  auto_scan: false
  top_n_markets: 5
  min_quote_volume: 0
  exclude_bases:
    - EUR
    - USDT
    - USDC

signals:
  use_sma: true
  sma_fast: 20
  sma_slow: 60

  use_rsi: true
  rsi_len: 14
  rsi_buy_min: 60

  use_atr: true
  atr_len: 14
  atr_tp_mult: 2.6
  atr_sl_mult: 1.5

  exit_on_trend_break: true

  use_atr_filter: true
  min_atr_pct: 0.35

risk:
  dry_run: false
  fixed_stake_quote: 30
  max_open_positions: 5
  only_buy_if_not_in_position: true
  cooldown_minutes: 60
  max_spread_pct: 0.20
  eur_reserve: 50
  skip_log_every_seconds: 900

fees:
  taker_fee_pct: 0.25

logging:
  level: INFO
  loop_sleep_seconds: 60
  candles_limit: 400
