quote: EUR
symbols: [BTC, ETH, XRP, SOL, ADA]
timeframe: "15m"

trading:
  enable_spot: true
  enable_short_signals: false
  enable_auto_short: false
  max_total_positions: 5
  allow_long_and_short_same_symbol: false

scanner:
  auto_scan: false
  top_n_markets: 5
  min_quote_volume: 0
  exclude_bases:
    - EUR
    - USDT
    - USDC

signals:
  use_sma: true
  sma_fast: 20
  sma_slow: 60

  use_rsi: true
  rsi_len: 14
  rsi_buy_min: 58

  use_atr: true
  atr_len: 14
  atr_tp_mult: 2.4
  atr_sl_mult: 1.3

  exit_on_trend_break: true

  use_atr_filter: true
  min_atr_pct: 0.30

risk:
  dry_run: false
  fixed_stake_quote: 50
  max_open_positions: 7
  only_buy_if_not_in_position: true
  cooldown_minutes: 45
  max_spread_pct: 0.20
  eur_reserve: 55
  skip_log_every_seconds: 600
  min_profit_eur: 0.20

fees:
  taker_fee_pct: 0.25

logging:
  level: INFO
  loop_sleep_seconds: 60
  candles_limit: 400

files:
  state_file: state.json
  trades_file: transactions.csv
